name: Generate Podcast

on:
  workflow_run:
    workflows: ["Generate Podcast Episode"]
    types: [completed]
  push:
    branches:
      - episodes
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-publish-rss:
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout code branch
        uses: actions/checkout@v6.0.3
        with:
          path: main
      - name: Checkout episodes branch
        uses: actions/checkout@v6.0.3
        with:
          ref: episodes
          path: episodes
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "main/.python-version"
      - name: Install dependencies
        working-directory: main
        run: |
          uv sync
      - name: Build RSS feed
        working-directory: main
        run: |
          mkdir public
          uv run articlepod rss build episodes/ > public/rss.xml
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: main/public
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
