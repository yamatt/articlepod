name: Generate Podcast

on:
  workflow_run:
    workflows: ["Add Article"]
    types: [completed]
  push:
    branches:
      - episodes
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pages: write

jobs:
  build-publish-rss:
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout code branch
        uses: actions/checkout@v7.0.0
        with:
          path: main
      - name: Checkout episodes branch
        uses: actions/checkout@v7.0.0
        with:
          ref: episodes
          path: episodes
      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.1
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "main/.python-version"
      - name: Install dependencies
        working-directory: main
        run: |
          uv sync
      - name: Generate BAML code
        working-directory: main
        run: |
          uv run baml generate --from baml_src/

      - name: Create public output directory
        run: |
          mkdir -p public
      - name: Build RSS feed
        working-directory: main
        run: |
          uv run articlepod rss generate-rss ../episodes/ > ../public/rss.xml
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
